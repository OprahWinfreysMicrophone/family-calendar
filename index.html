<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #faf7f2;
  --white: #ffffff;
  --bark: #3d2b1f;
  --bark-mid: #6b4c38;
  --bark-faint: #c4a98a;
  --border: #e2d8cc;
  --sage: #5c7a5c;
  --sage-bg: #e8f0e8;
  --rose: #9c4a4a;
  --rose-bg: #f5e8e8;
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  color: var(--bark);
}

#topbar {
  background: var(--bark); color: white;
  padding: 0.9rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 20;
}
.topbar-title { font-family: 'Lora', serif; font-size: 1.2rem; }
.add-btn-top {
  background: var(--sage); color: white; border: none;
  border-radius: 20px; padding: 7px 18px;
  font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem;
  cursor: pointer; font-weight: 600; transition: background 0.15s;
}
.add-btn-top:hover { background: #4a6a4a; }

#month-nav {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.25rem; background: var(--white);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 53px; z-index: 19;
}
.month-lbl {
  flex: 1; text-align: center;
  font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 600; color: var(--bark);
}
.nav-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--border); color: var(--bark);
  font-size: 1.2rem; cursor: pointer; transition: background 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.nav-btn:hover { background: var(--bark-faint); color: white; }
.today-btn {
  background: none; border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 14px;
  font-family: 'Source Sans 3', sans-serif; font-size: 0.85rem;
  color: var(--bark-mid); cursor: pointer; transition: all 0.15s;
}
.today-btn:hover { border-color: var(--bark-faint); color: var(--bark); }

#cal-wrap { padding: 1rem 1.25rem; max-width: 960px; margin: 0 auto; }

.day-headers {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px; margin-bottom: 3px;
}
.day-header {
  text-align: center; font-size: 0.78rem; font-weight: 600;
  color: var(--bark-mid); padding: 4px 0;
  text-transform: uppercase; letter-spacing: 0.04em;
}

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.cal-cell {
  background: var(--white); border-radius: 8px;
  min-height: 90px; padding: 6px;
  border: 1px solid var(--border);
  cursor: pointer; transition: border-color 0.15s;
}
.cal-cell:hover { border-color: var(--bark-faint); }
.cal-cell.other-month { background: var(--cream); opacity: 0.45; cursor: default; }
.cal-cell.other-month:hover { border-color: var(--border); }
.cal-cell.today { border: 2px solid var(--sage); }

.cell-num {
  font-size: 0.82rem; font-weight: 600; color: var(--bark-mid);
  margin-bottom: 3px;
}
.today-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--sage); color: white;
  font-size: 0.78rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 3px;
}

.cell-event {
  border-radius: 4px; padding: 2px 5px;
  font-size: 0.7rem; font-weight: 600; margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cell-event.doctor { background: var(--rose-bg); color: var(--rose); }
.cell-event.family { background: var(--sage-bg); color: var(--sage); }
.cell-more { font-size: 0.68rem; color: var(--bark-faint); padding: 1px 4px; }

#spinner {
  display: none; align-items: center; justify-content: center;
  padding: 4rem; gap: 12px; color: var(--bark-mid);
  grid-column: 1 / -1;
}
.spin {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--bark); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MODAL */
#backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(61,43,31,0.5); z-index: 100;
  align-items: center; justify-content: center; padding: 1rem;
}
#backdrop.open { display: flex; }

.modal {
  background: var(--white); border-radius: 20px;
  width: 100%; max-width: 460px; max-height: 88vh;
  overflow-y: auto; padding: 1.75rem; position: relative;
  box-shadow: 0 8px 40px rgba(61,43,31,0.25);
}
.modal-title {
  font-family: 'Lora', serif; font-size: 1.35rem; font-weight: 600;
  color: var(--bark); margin-bottom: 1.25rem;
}
.modal-close {
  position: absolute; top: 1.1rem; right: 1.25rem;
  background: none; border: none; font-size: 1.2rem;
  color: var(--bark-mid); cursor: pointer; line-height: 1;
}

.fgroup { margin-bottom: 0.9rem; }
.flabel {
  display: block; font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--bark-mid); margin-bottom: 4px;
}
.finput, .fselect, .ftextarea {
  width: 100%; padding: 10px 13px;
  border: 1.5px solid var(--border); border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1rem; color: var(--bark); background: white;
  appearance: none; transition: border-color 0.15s;
}
.finput:focus, .fselect:focus, .ftextarea:focus { outline: none; border-color: var(--bark-faint); }
.ftextarea { min-height: 70px; resize: vertical; line-height: 1.5; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn-primary {
  background: var(--bark); color: white; border: none;
  border-radius: 10px; padding: 12px; font-size: 1rem;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
  font-weight: 600; width: 100%; margin-top: 4px;
  transition: background 0.15s;
}
.btn-primary:hover { background: var(--bark-mid); }
.btn-primary:disabled { background: var(--bark-faint); cursor: not-allowed; }
.btn-secondary {
  background: none; border: 1px solid var(--border); color: var(--bark-mid);
  border-radius: 10px; padding: 10px; font-size: 0.95rem;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
  width: 100%; margin-top: 8px; transition: all 0.15s;
}
.btn-secondary:hover { border-color: var(--bark-faint); color: var(--bark); }
.btn-danger {
  background: none; border: 1px solid #e0c8c8; color: var(--rose);
  border-radius: 10px; padding: 10px; font-size: 0.95rem;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
  width: 100%; margin-top: 8px; transition: background 0.15s;
}
.btn-danger:hover { background: var(--rose-bg); }

.ok-msg  { color: var(--sage); font-size: 0.9rem; text-align: center; display: none; margin-top: 8px; }
.err-msg { color: var(--rose); font-size: 0.9rem; text-align: center; display: none; margin-top: 8px; }

/* Detail modal */
.det-badge {
  display: inline-block; border-radius: 20px;
  padding: 4px 14px; font-size: 0.9rem; font-weight: 600; margin-bottom: 10px;
}
.det-badge.family { background: var(--sage-bg); color: var(--sage); }
.det-badge.doctor { background: var(--rose-bg); color: var(--rose); }
.det-title { font-family: 'Lora', serif; font-size: 1.45rem; color: var(--bark); margin-bottom: 10px; }
.det-row { display: flex; gap: 8px; font-size: 0.95rem; color: var(--bark-mid); margin-bottom: 5px; }
.det-note { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); font-style: italic; color: var(--bark-mid); font-size: 0.9rem; line-height: 1.5; }

/* Day modal */
.day-date-lbl { font-family: 'Lora', serif; font-size: 1.1rem; color: var(--bark-mid); margin-bottom: 1rem; }
.day-ev-row {
  background: var(--cream); border-radius: 10px;
  padding: 0.85rem 1rem; margin-bottom: 7px;
  border-left: 5px solid var(--sage); cursor: pointer;
  transition: opacity 0.15s;
}
.day-ev-row:hover { opacity: 0.75; }
.day-ev-row.doctor { border-left-color: var(--rose); }
.day-ev-title { font-weight: 600; font-size: 0.95rem; color: var(--bark); }
.day-ev-meta  { font-size: 0.82rem; color: var(--bark-mid); margin-top: 2px; }
.btn-add-day {
  background: var(--sage); color: white; border: none;
  border-radius: 10px; padding: 11px; font-size: 0.95rem;
  cursor: pointer; font-family: 'Source Sans 3', sans-serif;
  font-weight: 600; width: 100%; margin-top: 4px;
  transition: background 0.15s;
}
.btn-add-day:hover { background: #4a6a4a; }

@media (max-width: 580px) {
  .cal-cell { min-height: 56px; padding: 4px 3px; }
  .cell-event { font-size: 0.62rem; padding: 1px 3px; }
  .day-header { font-size: 0.68rem; }
  #cal-wrap { padding: 0.6rem; }
  .frow { grid-template-columns: 1fr; }
  .month-lbl { font-size: 1.2rem; }
}
</style>
</head>
<body>

<div id="topbar">
  <span class="topbar-title">Family Calendar</span>
  <button class="add-btn-top" onclick="openAdd(null)">+ Add Event</button>
</div>

<div id="month-nav">
  <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
  <div class="month-lbl" id="month-lbl"></div>
  <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  <button class="today-btn" onclick="goToday()">Today</button>
</div>

<div id="cal-wrap">
  <div class="day-headers">
    <div class="day-header">Sun</div><div class="day-header">Mon</div>
    <div class="day-header">Tue</div><div class="day-header">Wed</div>
    <div class="day-header">Thu</div><div class="day-header">Fri</div>
    <div class="day-header">Sat</div>
  </div>
  <div class="cal-grid" id="cal-grid">
    <div id="spinner" style="grid-column:1/-1;display:flex"><div class="spin"></div>&nbsp;Loading…</div>
  </div>
</div>

<!-- BACKDROP -->
<div id="backdrop" onclick="backdropClick(event)">

  <!-- ADD MODAL -->
  <div class="modal" id="add-modal" style="display:none">
    <button class="modal-close" onclick="closeAll()">✕</button>
    <div class="modal-title" id="add-title">Add Event</div>
    <div class="fgroup">
      <label class="flabel">Type</label>
      <select class="fselect" id="f-type">
        <option value="family">Family Visit / Event</option>
        <option value="doctor">Doctor / Medical Visit</option>
      </select>
    </div>
    <div class="fgroup">
      <label class="flabel">Event name</label>
      <input class="finput" type="text" id="f-title" placeholder="e.g. Cardiology checkup, Birthday dinner…" />
    </div>
    <div class="frow">
      <div class="fgroup">
        <label class="flabel">Date</label>
        <input class="finput" type="date" id="f-date" />
      </div>
      <div class="fgroup">
        <label class="flabel">Time (optional)</label>
        <input class="finput" type="time" id="f-time" />
      </div>
    </div>
    <div class="fgroup">
      <label class="flabel">Location (optional)</label>
      <input class="finput" type="text" id="f-loc" placeholder="e.g. Dr. Smith's office, 123 Main St" />
    </div>
    <div class="fgroup">
      <label class="flabel">Notes (optional)</label>
      <textarea class="ftextarea" id="f-note" placeholder="e.g. Bring insurance card. T will drive."></textarea>
    </div>
    <button class="btn-primary" id="save-btn" onclick="saveEvent()">Save Event</button>
    <button class="btn-secondary" onclick="closeAll()">Cancel</button>
    <div class="ok-msg"  id="save-ok">Event saved!</div>
    <div class="err-msg" id="save-err"></div>
  </div>

  <!-- DAY MODAL -->
  <div class="modal" id="day-modal" style="display:none">
    <button class="modal-close" onclick="closeAll()">✕</button>
    <div class="day-date-lbl" id="day-lbl"></div>
    <div id="day-events"></div>
    <button class="btn-add-day" onclick="addFromDay()">+ Add Event This Day</button>
    <button class="btn-secondary" onclick="closeAll()">Close</button>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal" id="det-modal" style="display:none">
    <button class="modal-close" onclick="closeAll()">✕</button>
    <div id="det-body"></div>
    <button class="btn-danger" id="det-del">Delete This Event</button>
    <button class="btn-secondary" onclick="closeAll()">Close</button>
  </div>

</div>

<script>
const CAL_ID  = '388a5e554caaa4f14f7e94444283a05498c9fc534c09579143a6349c665ecec1@group.calendar.google.com';
const API_KEY = 'AIzaSyBS8QqL8RBnjDcEC_h0XYnXUI2mW9a1pvc';
const TZ      = 'America/Los_Angeles';
const MONTHS  = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let cY, cM, events = [], pickedDate = null;

(function(){ const n = new Date(); cY = n.getFullYear(); cM = n.getMonth(); loadMonth(); })();

function changeMonth(d){ cM+=d; if(cM>11){cM=0;cY++;} if(cM<0){cM=11;cY--;} loadMonth(); }
function goToday(){ const n=new Date(); cY=n.getFullYear(); cM=n.getMonth(); loadMonth(); }

async function loadMonth(){
  document.getElementById('month-lbl').textContent = MONTHS[cM]+' '+cY;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '<div id="spinner" style="grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:3rem;gap:10px;color:var(--bark-mid)"><div class="spin"></div>&nbsp;Loading…</div>';
  try {
    const s = new Date(cY,cM,1), e = new Date(cY,cM+1,0,23,59,59);
    events = await gcalList(s.toISOString(), e.toISOString());
    renderGrid();
  } catch(err){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--bark-mid)">Could not load — check your internet and try again.<br><small>${err.message}</small></div>`;
  }
}

function renderGrid(){
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const today    = new Date();
  const firstDay = new Date(cY,cM,1).getDay();
  const daysInM  = new Date(cY,cM+1,0).getDate();
  const daysInP  = new Date(cY,cM,0).getDate();
  const total    = Math.ceil((firstDay+daysInM)/7)*7;

  const byDate = {};
  events.forEach(ev => { const k=dateKey(ev); if(!byDate[k]) byDate[k]=[]; byDate[k].push(ev); });

  for(let i=0;i<total;i++){
    let day,mo,yr,other=false;
    if(i<firstDay){ day=daysInP-firstDay+i+1; mo=cM-1; yr=cY; if(mo<0){mo=11;yr--;} other=true; }
    else if(i>=firstDay+daysInM){ day=i-firstDay-daysInM+1; mo=cM+1; yr=cY; if(mo>11){mo=0;yr++;} other=true; }
    else{ day=i-firstDay+1; mo=cM; yr=cY; }

    const isToday = !other && day===today.getDate() && cM===today.getMonth() && cY===today.getFullYear();
    const dk = `${yr}-${pad(mo+1)}-${pad(day)}`;
    const evs = byDate[dk]||[];

    const cell = document.createElement('div');
    cell.className = 'cal-cell'+(other?' other-month':'')+(isToday?' today':'');

    if(isToday){ const n=document.createElement('div'); n.className='today-num'; n.textContent=day; cell.appendChild(n); }
    else { const n=document.createElement('div'); n.className='cell-num'; n.textContent=day; cell.appendChild(n); }

    evs.slice(0,3).forEach(ev=>{
      const t=guessType(ev.summary,ev.description);
      const lbl=(ev.summary||'').replace(/^\[(Doctor|Family)\]\s*/i,'');
      const d=document.createElement('div');
      d.className='cell-event '+t; d.textContent=lbl;
      d.onclick=(e)=>{e.stopPropagation();openDetail(ev);};
      cell.appendChild(d);
    });
    if(evs.length>3){ const m=document.createElement('div'); m.className='cell-more'; m.textContent=`+${evs.length-3} more`; cell.appendChild(m); }

    if(!other) cell.onclick=()=>openDay(dk,day,mo,yr);
    grid.appendChild(cell);
  }
}

function dateKey(ev){ return (ev.start?.dateTime||ev.start?.date||'').substring(0,10); }

function openDay(dk,day,mo,yr){
  pickedDate=dk;
  const evs=events.filter(ev=>dateKey(ev)===dk);
  const d=new Date(yr,mo,day);
  document.getElementById('day-lbl').textContent=DAYS[d.getDay()]+', '+MONTHS[mo]+' '+day+', '+yr;
  const list=document.getElementById('day-events');
  list.innerHTML='';
  if(!evs.length){ list.innerHTML='<p style="color:var(--bark-mid);font-size:0.95rem;margin-bottom:8px">No events this day.</p>'; }
  else { evs.forEach(ev=>{ const t=guessType(ev.summary,ev.description); const lbl=(ev.summary||'').replace(/^\[(Doctor|Family)\]\s*/i,''); const tm=ev.start?.dateTime?fmt12(new Date(ev.start.dateTime)):'All day'; const r=document.createElement('div'); r.className='day-ev-row '+t; r.innerHTML=`<div class="day-ev-title">${esc(lbl)}</div><div class="day-ev-meta">${tm}</div>`; r.onclick=()=>openDetail(ev); list.appendChild(r); }); }
  show('day-modal');
}

function addFromDay(){ closeAll(); setTimeout(()=>openAdd(pickedDate),80); }

function openAdd(dk){
  document.getElementById('add-title').textContent='Add Event';
  document.getElementById('f-type').value='family';
  document.getElementById('f-title').value='';
  document.getElementById('f-date').value=dk||new Date().toISOString().split('T')[0];
  document.getElementById('f-time').value='';
  document.getElementById('f-loc').value='';
  document.getElementById('f-note').value='';
  document.getElementById('save-btn').textContent='Save Event';
  document.getElementById('save-btn').disabled=false;
  hide('save-ok'); hide('save-err');
  show('add-modal');
}

function openDetail(ev){
  const t=guessType(ev.summary,ev.description);
  const lbl=(ev.summary||'').replace(/^\[(Doctor|Family)\]\s*/i,'');
  const s=ev.start?.dateTime||ev.start?.date||'';
  const d=new Date(s.includes('T')?s:s+'T12:00:00');
  const ds=DAYS[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
  const tm=ev.start?.dateTime?fmt12(d):'All day';
  const note=(ev.description||'').replace(/\nAdded by:.*$/m,'').trim();
  document.getElementById('det-body').innerHTML=`
    <div class="det-badge ${t}">${t==='doctor'?'🏥 Doctor Visit':'👨‍👩‍👧 Family Event'}</div>
    <div class="det-title">${esc(lbl)}</div>
    <div class="det-row"><span>📅</span>${esc(ds)}</div>
    <div class="det-row"><span>⏰</span>${tm}</div>
    ${ev.location?`<div class="det-row"><span>📍</span>${esc(ev.location)}</div>`:''}
    ${note?`<div class="det-note">${esc(note)}</div>`:''}
  `;
  document.getElementById('det-del').onclick=()=>deleteEv(ev.id);
  show('det-modal');
}

async function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const loc=document.getElementById('f-loc').value.trim();
  const note=document.getElementById('f-note').value.trim();
  const type=document.getElementById('f-type').value;
  hide('save-ok'); hide('save-err');
  if(!title||!date){ showErr('save-err','Please enter a name and date.'); return; }
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving…';
  try{
    let start,end;
    if(time){ const [h,m]=time.split(':').map(Number); start={dateTime:`${date}T${pad(h)}:${pad(m)}:00`,timeZone:TZ}; end={dateTime:`${date}T${pad(h+1)}:${pad(m)}:00`,timeZone:TZ}; }
    else { const nx=new Date(date+'T12:00:00'); nx.setDate(nx.getDate()+1); start={date}; end={date:nx.toISOString().split('T')[0]}; }
    await gcalInsert({ summary:`[${type==='doctor'?'Doctor':'Family'}] ${title}`, description:note||undefined, location:loc||undefined, start, end });
    btn.disabled=false; btn.textContent='Save Event';
    document.getElementById('save-ok').style.display='block';
    setTimeout(()=>{ closeAll(); loadMonth(); },1200);
  } catch(e){ btn.disabled=false; btn.textContent='Save Event'; showErr('save-err','Could not save. Try again. ('+e.message+')'); }
}

async function deleteEv(id){
  if(!confirm('Delete this event?\nThis removes it for everyone.')) return;
  try{ await gcalDelete(id); closeAll(); loadMonth(); }
  catch(e){ alert('Could not delete. Try again.'); }
}

async function gcalList(tMin,tMax){
  const base='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(CAL_ID)+'/events';
  const qs='key='+encodeURIComponent(API_KEY)+'&timeMin='+encodeURIComponent(tMin)+'&timeMax='+encodeURIComponent(tMax)+'&timeZone='+encodeURIComponent(TZ)+'&singleEvents=true&orderBy=startTime&maxResults=250';
  const r=await fetch(base+'?'+qs);
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'Fetch failed '+r.status); }
  return (await r.json()).items||[];
}

async function gcalInsert(ev){
  const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events?key=${API_KEY}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(ev)});
  if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error?.message||'Insert failed'); }
  return r.json();
}

async function gcalDelete(id){
  const r=await fetch(`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CAL_ID)}/events/${id}?key=${API_KEY}`,{method:'DELETE'});
  if(!r.ok&&r.status!==204) throw new Error('Delete failed');
}

function show(id){ document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); document.getElementById(id).style.display='block'; document.getElementById('backdrop').classList.add('open'); }
function closeAll(){ document.getElementById('backdrop').classList.remove('open'); document.querySelectorAll('.modal').forEach(m=>m.style.display='none'); }
function backdropClick(e){ if(e.target===document.getElementById('backdrop')) closeAll(); }
function guessType(t,d){ return /\[doctor\]|doctor|dr\.|medical|checkup|clinic|hospital|dentist|specialist|therapy|lab|scan|vaccine|surgery|pharmacy|cardio|optom/i.test((t||'')+' '+(d||''))?'doctor':'family'; }
function fmt12(d){ const h=d.getHours(),m=d.getMinutes(); return `${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hide(id){ document.getElementById(id).style.display='none'; }
function showErr(id,msg){ const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
</script>
